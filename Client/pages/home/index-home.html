<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Rick and morty</title>
      <link rel="stylesheet" href="../../styles.css">
      <script src="../../scripts/script-home.js"></script>
  </head>
  <body>
    <main>
      <header id="header-home">
        <div class="logo-container">
          <img src="../../assets/logo.png" alt="Rick And Morty logo" height="40" width="40">
        </div>

        <nav id="navbar">
          <ul id="links-container">
            <li class="items"><a href="../about/index-about.html" class="links">About</a></li>
            <li class="items"><a href="../favorites/index-favorites.html" class="links">Favorites</a></li>
            <li class="items"> <button id="logout" class="links">Logout</button></li>
          </ul>
        </nav>
      </header>

      <section class="cards-container">
      </section>

      <footer id="home-footer">
        <div id="form-container">
          <dialog id="instruction">
            <button id="modal-button">x</button>
            Please introduce an ID between 1 - 825.
          </dialog>
          <form action="submit" id="search-bar">
            <div id="input-container">
              <input type="text" id="input-id" placeholder="Search..." autocomplete="off">
              <button id="add" type="submit">
                <svg viewBox="0 0 24 24" fill="none" height="20" width="20"xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M20 7V8.2C20 9.88016 20 10.7202 19.673 11.362C19.3854 11.9265 18.9265 12.3854 18.362 12.673C17.7202 13 16.8802 13 15.2 13H4M4 13L8 9M4 13L8 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></g></svg>
              </button>
              <tool-tip role="tooltip" id="submit-message">
                Submit
              </tool-tip>
              <p id="error-message"></p>
            </div>
          </form>
        </div>
      </footer>
    </main>
  </body>
</html>
