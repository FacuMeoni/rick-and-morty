<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Rick and Morty</title>
    <script src="../../scripts/script-register.js"></script>
    <link rel="stylesheet" href="../../styles.css">
</head>
<body>
    <main class="containers">
      <a href="../login/index.html" id="login-link">
        Login
      </a>

      <header id="title-container-1">
        <h2 class="register-title">
          Create account
        </h2>

        <span class="register-span">
          Register and enjoy Rick and Morty world!
        </span>
      </header>

      <section class="sections">
        <form action="submit" id="register-form" class="forms">

          <div class="input-containers">
            <input type="text" id="username-register" placeholder="Username" class="inputs">
          </div>
          
          <div class="input-containers">
            <input type="password" id="password-register" placeholder="Password" class="inputs">
          </div>

          <button id="register-button" type="submit" class="submit-buttons"> 
                Register
          </button>
        </form>

        <div class="error-container">
        </div>
      </section>
    </main>
</body>
</html>
