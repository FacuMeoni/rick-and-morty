<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Rick and Morty</title>
    <script src="../../scripts/script-register.js"></script>
    <link rel="stylesheet" href="../../styles.css">
</head>
<body>
    <main class="container">
      <section id="register-section" class="right">
        <div class="right-container">
          <form action="submit" id="register-form" class="forms">
            <header id="header-register">
              <h2 class="title">
              Sign up on Rick and Morty
              </h2>


              <div class="link-container">
                <span class="link-text">
                  Already have an account? <a href="../login/index.html" class="link">Sign In</a>
                </span>
              </div>
            </header>    

            <div class="input-containers">
              <input type="text" id="username-register" placeholder="Username" class="inputs">
            </div>
            
            <div class="password-input-container input-containers">
              <input type="password" id="password-register" placeholder="Password" class="inputs">
              <img src="../../assets/eye.svg" 
                alt="Eye icon"  
                id="input-icon"
                >
            </div>

            <button id="register-button" type="submit" class="submit-buttons"> 
                  Register
            </button>

            <div class="error-container">
            </div>
          </form>
        </div>
      </section>
    </main>
</body>
</html>
